name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24.18

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build -- --base-href=/gestor-de-noticias/

    - name: List dist contents
      run: ls -la dist/Gestor-de-noticias/ || true  # ← Verificamos la subcarpeta

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist/Gestor-de-noticias/browser  # ← ¡Usamos el nombre exacto con mayúscula!
        branch: gh-pages
        clean: true
        token: ${{ secrets.DEPLOY_TOKEN }}