name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24.18

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build -- --base-href=/gestor-de-noticias/

    - name: List dist contents (debug)
      run: ls -la dist/ || true  # ← Muestra el contenido de dist/

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist  # ← Despliega toda la carpeta dist/
        branch: gh-pages
        clean: true