name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24.18.0  # ← ¡Cambiado! Usa tu versión

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build -- --base-href=/gestor-de-noticias/

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist/gestor-de-noticias/browser
        branch: gh-pages
        clean: true