<div class="container">
  <h1>{{ title() }}</h1>
  <h2 class="subtitle-1">Uveg Reto 2 Unidad 2 Programación Web Multiplataforma</h2>
  <h3 class="subtitle-2">Construyendo con TypeScript y módulos en Angular</h3>
  <hr>

  <!-- Formulario para agregar noticias -->
   <div class="form-section">
    <h2>+ Agregar Noticia</h2>
    <form (ngSubmit)="agregarNoticia()">
      <input type="text" [(ngModel)]="nuevaNoticia.titulo" name="titulo" placeholder="Título" required>
      <input type="text" [(ngModel)]="nuevaNoticia.contenido" name="contenido" placeholder="Contenido">
      <input type="text" [(ngModel)]="nuevaNoticia.imagenUrl" name="imagenUrl" placeholder="URL de imagen" required>
      <input type="text" [(ngModel)]="nuevaNoticia.autor" name="autor" placeholder="Autor" required>
      <button type="submit">Agregar noticia</button>
    </form>
   </div>

   <hr>

   <!-- Formulario para editar noticias -->
    <div class="form-section">
      <h2>Editar Noticia</h2>
      <form (ngSubmit)="editarNoticia()">
        <input type="number" [(ngModel)]="noticiaEditar.id" name="idEditar" placeholder="ID de Noticia" required>
        <input type="text" [(ngModel)]="noticiaEditar.titulo" name="tituloEditar" placeholder="Nuevo Título" required>
        <input type="text" [(ngModel)]="noticiaEditar.contenido" name="contenidoEditar" placeholder="Nuevo contenido" required>
        <input type="text" [(ngModel)]="noticiaEditar.imagenUrl" name="imagenUrlEditar" placeholder="Nueva URL de imagen" required>
        <input type="text" [(ngModel)]="noticiaEditar.autor" name="autorEditar" placeholder="Nuevo autor" required>
        <button type="submit">Editar Noticia</button>
      </form>
    </div>

    <hr>

    <!-- Formulario para eliminar noticias -->
     <div class="form-section">
      <h2>Eliminar Noticia</h2>
      <form (ngSubmit)="eliminarNoticia()">
        <input type="number" [(ngModel)]="idEliminar" name="idEliminar" placeholder="ID de noticia a eliminar" required>
        <button type="submit">Eliminar Noticia</button>
      </form>
     </div>

     <hr>

     <!-- Formulario para eliminar noticias -->
      <div class="json-section">
        <h2>Datos en JSON</h2>
        <pre>{{ noticiasJSON }}</pre>
      </div>

</div>
